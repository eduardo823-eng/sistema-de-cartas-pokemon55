<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Master - Combate Estratégico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="resolucion">
        <div class="desktop">
            
        </div>
        <div class="tablet">
            
        </div>
        <div class="movil">
            
        </div>
    </div>
    <!-- Pantalla de inicio -->
    <div class="trainer-screen" id="trainerScreen">
        <div class="trainer-form">
            <div style="font-family: 'Press Start 2P', cursive; color: #FFD700; font-size: 1.3em; margin-bottom: 30px;">
                ¡BIENVENIDO ENTRENADOR!
            </div>
            <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='40' r='35' fill='white' stroke='black' stroke-width='2'/><path d='M5,50 L95,50' stroke='black' stroke-width='2'/><circle cx='50' cy='50' r='8' fill='black'/></svg>" 
                alt="Pokéball" style="width: 100px; margin: 20px auto; display: block; animation: float 2s ease-in-out infinite;">
            <input type="text" id="trainerName" 
                style="width: 100%; padding: 20px; border: 3px solid #FFD700; border-radius: 15px; background: rgba(255, 255, 255, 0.9); font-family: 'Press Start 2P', cursive; font-size: 14px; text-align: center;"
                placeholder="TU NOMBRE" maxlength="20">
            <button class="btn btn-primary" onclick="startGame()" style="margin-top: 20px; font-size: 14px; padding: 20px 40px;">
                ¡COMENZAR AVENTURA!
            </button>
        </div>
    </div>

    <!-- Selección de equipo -->
    <div id="teamSelection" style="display: none; padding: 20px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-family: 'Press Start 2P', cursive; color: #FFD700; font-size: 1.2em;">
                ¡ELIGE 3 POKÉMON, <span id="trainerNameDisplay"></span>!
            </h2>
            <p style="color: #aaa; font-family: 'Press Start 2P', cursive; font-size: 10px; margin-top: 10px;">
                Seleccionados: <span id="selectedCount">0</span>/3
            </p>
        </div>
        <div class="pokemon-selector" id="pokemonSelector"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn btn-primary" onclick="confirmTeam()" style="font-size: 14px; padding: 20px 40px;">
                ⚔️ ¡A LA BATALLA!
            </button>
        </div>
    </div>

    <!-- Batalla principal -->
    <div class="main-layout" id="battleLayout" style="display: none;">
        <!-- Panel de recomendaciones -->
        <div class="advisor-panel">
            <div class="advisor-title">🎯 ASESOR DE BATALLA</div>
            <div id="adviceContainer">
                <div class="advice-card">
                    <div class="advice-header">📊 ESPERANDO BATALLA</div>
                    <div class="advice-content">Selecciona tu equipo para comenzar el análisis</div>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <div class="advisor-title">📚 REGLAS ACTIVAS</div>
                <div id="activeRules" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- Pantalla de batalla -->
        <div class="battle-screen">
            <div class="battlefield">
                <div class="battle-pokemon" id="playerPokemon">
                    <img id="playerSprite" src="" class="pokemon-sprite-battle">
                    <div class="hp-container">
                        <div class="hp-info">
                            <span id="playerName"></span>
                            <span id="playerHPText"></span>
                        </div>
                        <div class="hp-bar-outer">
                            <div class="hp-bar-inner" id="playerHPBar"></div>
                        </div>
                    </div>
                </div>
                <div class="battle-pokemon" id="enemyPokemon">
                    <img id="enemySprite" src="" class="pokemon-sprite-battle">
                    <div class="hp-container">
                        <div class="hp-info">
                            <span id="enemyName"></span>
                            <span id="enemyHPText"></span>
                        </div>
                        <div class="hp-bar-outer">
                            <div class="hp-bar-inner" id="enemyHPBar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="moves-panel">
                <div class="moves-grid" id="movesGrid"></div>
            </div>

            <div class="battle-log" id="battleLog">
                <div class="log-entry">¡Comienza la batalla!</div>
            </div>

            <div class="battle-controls">
                <button class="btn btn-info" onclick="requestAdvice()">📊 Pedir Consejo</button>
                <button class="btn btn-primary" onclick="switchPokemon()">🔄 Cambiar</button>
                <button class="btn btn-danger" onclick="surrender()">🏳️ Rendirse</button>
            </div>
        </div>

        <!-- Panel de equipo -->
        <div class="team-panel">
            <div class="team-title">🎒 TU EQUIPO</div>
            <div id="teamContainer"></div>
        </div>
    </div>

    <!-- Resultado de batalla -->
    <div class="battle-result" id="battleResult">
        <div id="resultTitle" style="font-family: 'Press Start 2P', cursive; font-size: 2em; margin-bottom: 30px;"></div>
        <button class="btn btn-primary" onclick="newBattle()" style="font-size: 14px;">🔄 Nueva Batalla</button>
    </div>

        // Efectividades de tipos
        const typeChart = {

            'psychic': { 'fighting': 2, 'poison': 2, 'psychic': 0.5, 'steel': 0.5, 'dark': 0 },
            'bug': { 'grass': 2, 'psychic': 2, 'dark': 2, 'fire': 0.5, 'fighting': 0.5, 'poison': 0.5, 'flying': 0.5, 'ghost': 0.5, 'steel': 0.5, 'fairy': 0.5 },
            'rock': { 'fire': 2, 'ice': 2, 'flying': 2, 'bug': 2, 'fighting': 0.5, 'ground': 0.5, 'steel': 0.5 },
            'ghost': { 'psychic': 2, 'ghost': 2, 'normal': 0, 'dark': 0.5 },
            'dragon': { 'dragon': 2, 'steel': 0.5, 'fairy': 0 },
            'steel': { 'ice': 2, 'rock': 2, 'fairy': 2, 'fire': 0.5, 'water': 0.5, 'electric': 0.5, 'steel': 0.5 },
            'fairy': { 'fighting': 2, 'dragon': 2, 'dark': 2, 'fire': 0.5, 'poison': 0.5, 'steel': 0.5 },
            'dark': { 'psychic': 2, 'ghost': 2, 'fighting': 0.5, 'dark': 0.5, 'fairy': 0.5 }
        };

        function startGame() {
            const nameInput = document.getElementById('trainerName');
            const name = nameInput.value.trim();
            
            if (name === '') {
                alert('¡Por favor ingresa tu nombre de entrenador!');
                return;
            }
            
            trainerName = name;
            document.getElementById('trainerNameDisplay').textContent = trainerName.toUpperCase();
            
            document.getElementById('trainerScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('trainerScreen').style.display = 'none';
                document.getElementById('teamSelection').style.display = 'block';
                populatePokemonSelection();
            }, 500);
        }

        function populatePokemonSelection() {
            const selector = document.getElementById('pokemonSelector');
            selector.innerHTML = Object.entries(pokemonDatabase).map(([name, data]) => `
                <div class="pokemon-option" onclick="togglePokemonSelection('${name}')" id="option-${name}">
                    <img src="${data.sprite}" alt="${name}">
                    <div class="name">${name}</div>
                    <div style="display: flex; justify-content: center; gap: 3px; margin-top: 5px;">
                        ${data.types.map(type => `<span style="font-size: 7px; padding: 2px 6px; border-radius: 8px; background: #666; color: white;">${type}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function togglePokemonSelection(pokemonName) {
            const index = playerTeam.indexOf(pokemonName);
            if (index > -1) {
                playerTeam.splice(index, 1);
                document.getElementById(`option-${pokemonName}`).classList.remove('selected');
            } else if (playerTeam.length < 3) {
                playerTeam.push(pokemonName);
                document.getElementById(`option-${pokemonName}`).classList.add('selected');
            }
            document.getElementById('selectedCount').textContent = playerTeam.length;
        }

        function confirmTeam() {
            if (playerTeam.length !== 3) {
                alert('¡Debes seleccionar exactamente 3 Pokémon!');
                return;
            }
            
            // Crear equipo enemigo aleatorio
            const availableEnemies = Object.keys(pokemonDatabase).filter(name => !playerTeam.includes(name));
            enemyTeam = [];
            for (let i = 0; i < 3; i++) {
                const randomIndex = Math.floor(Math.random() * availableEnemies.length);
                enemyTeam.push(availableEnemies[randomIndex]);
                availableEnemies.splice(randomIndex, 1);
            }
            
            document.getElementById('teamSelection').style.display = 'none';
            document.getElementById('battleLayout').style.display = 'grid';
            
            startNewBattle();
        }

        function startNewBattle() {
            currentPlayerPokemon = {
                ...pokemonDatabase[playerTeam[0]],
                name: playerTeam[0],
                currentHP: pokemonDatabase[playerTeam[0]].stats.hp,
                maxHP: pokemonDatabase[playerTeam[0]].stats.hp
            };
            
            currentEnemyPokemon = {
                ...pokemonDatabase[enemyTeam[0]],
                name: enemyTeam[0],
                currentHP: pokemonDatabase[enemyTeam[0]].stats.hp,
                maxHP: pokemonDatabase[enemyTeam[0]].stats.hp
            };
            
            battleActive = true;
            isPlayerTurn = true;
            
            updateBattleUI();
            updateTeamPanel();
            generateAdvice();
            updateActiveRules();
            
            addBattleLog(`¡${trainerName} envía a ${currentPlayerPokemon.name}!`);
            addBattleLog(`¡El enemigo envía a ${currentEnemyPokemon.name}!`);
        }

        function updateBattleUI() {
            document.getElementById('playerName').textContent = currentPlayerPokemon.name;
            document.getElementById('enemyName').textContent = currentEnemyPokemon.name;
            document.getElementById('playerSprite').src = currentPlayerPokemon.sprite;
            document.getElementById('enemySprite').src = currentEnemyPokemon.sprite;
            
            updateHPBars();
            populateMoves();
        }

        function updateHPBars() {
            const playerPercent = (currentPlayerPokemon.currentHP / currentPlayerPokemon.maxHP) * 100;
            const enemyPercent = (currentEnemyPokemon.currentHP / currentEnemyPokemon.maxHP) * 100;
            
            document.getElementById('playerHPText').textContent = `${currentPlayerPokemon.currentHP}/${currentPlayerPokemon.maxHP}`;
            document.getElementById('enemyHPText').textContent = `${currentEnemyPokemon.currentHP}/${currentEnemyPokemon.maxHP}`;
            
            updateHPBar('playerHPBar', playerPercent);
            updateHPBar('enemyHPBar', enemyPercent);
        }

        function updateHPBar(id, percent) {
            const bar = document.getElementById(id);
            bar.style.width = percent + '%';
            bar.className = 'hp-bar-inner';
            if (percent <= 25) bar.classList.add('critical');
            else if (percent <= 50) bar.classList.add('low');
            else if (percent <= 75) bar.classList.add('medium');
        }

        function populateMoves() {
            const movesGrid = document.getElementById('movesGrid');
            const recommendations = getRecommendedMoves();
            
            movesGrid.innerHTML = currentPlayerPokemon.moves.map((move, index) => `
                <button class="move-btn ${recommendations.includes(index) ? 'recommended' : ''}" 
                        onclick="executeMove(${index})" id="move-${index}">
                    <div class="move-type-badge" style="background: #666;">${move.type.toUpperCase()}</div>
                    <div>${move.name}</div>
                    <div class="move-damage-preview">
                        ⚡ ${move.power > 0 ? move.power : '---'} | 🎯 ${move.accuracy}%
                    </div>
                    ${recommendations.includes(index) ? '<div style="color: #44FF44; font-size: 7px; margin-top: 3px;">★ RECOMENDADO</div>' : ''}
                </button>
            `).join('');
        }

        function executeMove(moveIndex) {
            if (!isPlayerTurn || !battleActive) return;
            
            const move = currentPlayerPokemon.moves[moveIndex];
            isPlayerTurn = false;
            disableMoves(true);
            
            animateAttack('player');
            
            const { damage, effectiveness, isCritical } = calculateDamage(currentPlayerPokemon, currentEnemyPokemon, move);
            
            setTimeout(() => {
                if (Math.random() * 100 > move.accuracy) {
                    addBattleLog(`${currentPlayerPokemon.name} falló ${move.name}...`);
                } else {
                    currentEnemyPokemon.currentHP = Math.max(0, currentEnemyPokemon.currentHP - Math.floor(damage));
                    animateHit('enemy');
                    showDamageNumber(damage, effectiveness, isCritical);
                    
                    addBattleLog(`${currentPlayerPokemon.name} usó ${move.name}`);
                    if (isCritical) addBattleLog('¡GOLPE CRÍTICO! 💥');
                    if (effectiveness >= 2) addBattleLog('¡Es súper efectivo! 🔥');
                    if (effectiveness <= 0.5 && effectiveness > 0) addBattleLog('No es muy efectivo... 😕');
                    if (effectiveness === 0) addBattleLog('¡No afecta al enemigo! 🚫');
                    
                    addBattleLog(`Causó ${Math.floor(damage)} de daño`);
                    
                    updateHPBars();
                    
                    if (currentEnemyPokemon.currentHP <= 0) {
                        handleEnemyFainted();
                        return;
                    }
                }
                
                setTimeout(enemyTurn, 1000);
            }, 500);
        }

        function enemyTurn() {
            if (!battleActive) return;
            
            const moves = currentEnemyPokemon.moves.filter(m => m.power > 0);
            const move = moves[Math.floor(Math.random() * moves.length)];
            
            animateAttack('enemy');
            
            const { damage, effectiveness, isCritical } = calculateDamage(currentEnemyPokemon, currentPlayerPokemon, move);
            
            setTimeout(() => {
                if (Math.random() * 100 > move.accuracy) {
                    addBattleLog(`${currentEnemyPokemon.name} falló ${move.name}...`);
                } else {
                    currentPlayerPokemon.currentHP = Math.max(0, currentPlayerPokemon.currentHP - Math.floor(damage));
                    animateHit('player');
                    showDamageNumber(damage, effectiveness, isCritical);
                    
                    addBattleLog(`${currentEnemyPokemon.name} usó ${move.name}`);
                    if (isCritical) addBattleLog('¡GOLPE CRÍTICO! 💥');
                    
                    updateHPBars();
                    
                    if (currentPlayerPokemon.currentHP <= 0) {
                        handlePlayerFainted();
                        return;
                    }
                }
                
                isPlayerTurn = true;
                disableMoves(false);
                generateAdvice();
                addBattleLog('¿Qué harás ahora?');
            }, 500);
        }

        function calculateDamage(attacker, defender, move) {
            if (move.power === 0) return { damage: 0, effectiveness: 1, isCritical: false };
            
            let typeEffectiveness = 1;
            attacker.types.forEach(atkType => {
                defender.types.forEach(defType => {
                    if (typeChart[atkType] && typeChart[atkType][defType] !== undefined) {
                        typeEffectiveness *= typeChart[atkType][defType];
                    }
                });
            });
            
            const STAB = attacker.types.includes(move.type) ? 1.5 : 1;
            const isCritical = Math.random() < 0.1;
            const criticalMultiplier = isCritical ? 1.5 : 1;
            
            // Fórmula de daño balanceada
            let damage = ((2 * 50 / 5 + 2) * move.power * attacker.stats.atk / defender.stats.def / 50 + 2);
            damage *= STAB * typeEffectiveness * criticalMultiplier;
            damage *= (Math.random() * 0.15 + 0.85); // Variación aleatoria
            
            return { 
                damage: Math.max(1, damage),
                effectiveness: typeEffectiveness,
                isCritical 
            };
        }

        function getRecommendedMoves() {
            const recommendations = [];
            let bestDamage = 0;
            let bestIndex = -1;
            
            currentPlayerPokemon.moves.forEach((move, index) => {
                if (move.power > 0) {
                    const { damage } = calculateDamage(currentPlayerPokemon, currentEnemyPokemon, move);
                    if (damage > bestDamage) {
                        bestDamage = damage;
                        bestIndex = index;
                    }
                }
            });
            
            if (bestIndex >= 0) recommendations.push(bestIndex);
            return recommendations;
        }

        function generateAdvice() {
            const container = document.getElementById('adviceContainer');
            const advice = [];
            
            // Análisis de tipo
            let bestMove = null;
            let bestDamage = 0;
            
            currentPlayerPokemon.moves.forEach(move => {
                if (move.power > 0) {
                    const { damage, effectiveness } = calculateDamage(currentPlayerPokemon, currentEnemyPokemon, move);
                    if (damage > bestDamage) {
                        bestDamage = damage;
                        bestMove = { ...move, effectiveness };
                    }
                }
            });
            
            if (bestMove) {
                advice.push({
                    type: 'attack',
                    header: '⚔️ MEJOR ATAQUE',
                    content: `Usa <strong>${bestMove.name}</strong> para causar ~${Math.floor(bestDamage)} de daño.`,
                    confidence: bestMove.effectiveness >= 2 ? 0.95 : bestMove.effectiveness >= 1 ? 0.75 : 0.5
                });
            }
            
            // Análisis de riesgo
            const playerHPPercent = (currentPlayerPokemon.currentHP / currentPlayerPokemon.maxHP) * 100;
            if (playerHPPercent < 30) {
                const availableSwitches = playerTeam.filter(p => 
                    p !== currentPlayerPokemon.name && 
                    pokemonDatabase[p].stats.hp === pokemonDatabase[p].stats.hp // No está debilitado
                );
                
                if (availableSwitches.length > 0) {
                    advice.push({
                        type: 'switch',
                        header: '🔄 CAMBIO RECOMENDADO',
                        content: `${currentPlayerPokemon.name} está débil. Cambia a ${availableSwitches[0]} para continuar.`,
                        confidence: 0.85
                    });
                }
            }
            
            // Análisis de rendición
            const remainingPokemon = playerTeam.filter(p => p !== currentPlayerPokemon.name);
            if (playerHPPercent < 15 && remainingPokemon.length === 0) {
                advice.push({
                    type: 'retreat',
                    header: '🏳️ CONSIDERA RENDIRTE',
                    content: 'No tienes más Pokémon disponibles. Rendirte puede ahorrar tiempo.',
                    confidence: 0.7
                });
            }
            
            container.innerHTML = advice.map(a => `
                <div class="advice-card ${a.type}">
                    <div class="advice-header">${a.header}</div>
                    <div class="advice-content">${a.content}</div>
                    <span class="advice-confidence ${
                        a.confidence >= 0.8 ? 'confidence-high' :
                        a.confidence >= 0.6 ? 'confidence-medium' :
                        'confidence-low'
                    }">
                        ${Math.round(a.confidence * 100)}% confianza
                    </span>
                </div>
            `).join('');
        }

        function updateActiveRules() {
            const container = document.getElementById('activeRules');
            container.innerHTML = battleRules.map((rule, index) => `
                <div style="background: rgba(255,255,255,0.05); padding: 8px; margin: 5px 0; border-radius: 8px; font-size: 9px; color: #fff;">
                    <span style="color: #FFD700;">Regla #${index + 1}:</span> ${rule.action}
                </div>
            `).join('');
        }

        function handleEnemyFainted() {
            addBattleLog(`¡${currentEnemyPokemon.name} se debilitó! 🎉`);
            enemyTeam.shift();
            
            if (enemyTeam.length === 0) {
                endBattle('victory');
                return;
            }
            
            // Enviar siguiente Pokémon enemigo
            currentEnemyPokemon = {
                ...pokemonDatabase[enemyTeam[0]],
                name: enemyTeam[0],
                currentHP: pokemonDatabase[enemyTeam[0]].stats.hp,
                maxHP: pokemonDatabase[enemyTeam[0]].stats.hp
            };
            
            addBattleLog(`¡El enemigo envía a ${currentEnemyPokemon.name}!`);
            updateBattleUI();
            isPlayerTurn = true;
            disableMoves(false);
            generateAdvice();
        }

        function handlePlayerFainted() {
            addBattleLog(`¡${currentPlayerPokemon.name} se debilitó! 😢`);
            playerTeam = playerTeam.filter(p => p !== currentPlayerPokemon.name);
            
            if (playerTeam.length === 0) {
                endBattle('defeat');
                return;
            }
            
            // Preguntar qué Pokémon enviar
            switchPokemon(true);
        }

        function switchPokemon(forced = false) {
            if (!battleActive && !forced) return;
            
            const availablePokemon = playerTeam.filter(p => p !== currentPlayerPokemon.name);
            
            if (availablePokemon.length === 0) {
                addBattleLog('¡No tienes más Pokémon disponibles!');
                if (forced) endBattle('defeat');
                return;
            }
            
            // Si es forzado, cambiar automáticamente al primer disponible
            if (forced) {
                changeToPokemon(availablePokemon[0]);
            } else {
                // Mostrar opciones de cambio
                const choice = prompt(`Elige un Pokémon:\n${availablePokemon.join('\n')}`);
                if (choice && availablePokemon.includes(choice)) {
                    changeToPokemon(choice);
                }
            }
        }

        function changeToPokemon(pokemonName) {
            addBattleLog(`${trainerName} retira a ${currentPlayerPokemon.name}`);
            
            currentPlayerPokemon = {
                ...pokemonDatabase[pokemonName],
                name: pokemonName,
                currentHP: pokemonDatabase[pokemonName].stats.hp,
                maxHP: pokemonDatabase[pokemonName].stats.hp
            };
            
            addBattleLog(`¡Adelante, ${pokemonName}!`);
            updateBattleUI();
            updateTeamPanel();
            isPlayerTurn = true;
            disableMoves(false);
            generateAdvice();
        }

        function updateTeamPanel() {
            const container = document.getElementById('teamContainer');
            container.innerHTML = playerTeam.map(pokemon => {
                const data = pokemonDatabase[pokemon];
                const isActive = pokemon === currentPlayerPokemon.name;
                return `
                    <div class="team-pokemon ${isActive ? 'active' : ''}" 
                         onclick="${pokemon !== currentPlayerPokemon.name ? `changeToPokemon('${pokemon}')` : ''}">
                        <div style="text-align: center;">
                            <img src="${data.sprite}" style="width: 60px; height: 60px;">
                            <div style="font-family: 'Press Start 2P', cursive; font-size: 8px; color: white; margin-top: 5px;">
                                ${pokemon}
                            </div>
                            <div style="display: flex; justify-content: center; gap: 3px; margin-top: 3px;">
                                ${data.types.map(type => `<span style="font-size: 6px; padding: 2px 5px; border-radius: 5px; background: #666; color: white;">${type}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function requestAdvice() {
            generateAdvice();
            addBattleLog('📊 Consultando al asesor de batalla...');
        }

        function surrender() {
            if (confirm('¿Estás seguro de que quieres rendirte?')) {
                endBattle('defeat');
            }
        }

        function endBattle(result) {
            battleActive = false;
            disableMoves(true);
            
            const resultDiv = document.getElementById('battleResult');
            const title = document.getElementById('resultTitle');
            
            if (result === 'victory') {
                title.innerHTML = '¡VICTORIA! 🏆';
                title.style.color = '#44FF44';
                addBattleLog('¡Ganaste la batalla!');
                
                // Aprender regla
                const newRule = {
                    condition: {
                        enemyType: currentEnemyPokemon.types[0],
                        playerType: currentPlayerPokemon.types[0]
                    },
                    action: `${trainerName} venció a ${currentEnemyPokemon.name} con ${currentPlayerPokemon.name}`,
                    type: 'attack',
                    confidence: 0.88,
                    learned: true
                };
                battleRules.push(newRule);
            } else {
                title.innerHTML = 'DERROTA... 💔';
                title.style.color = '#FF4444';
                addBattleLog('Has perdido la batalla...');
            }
            
            resultDiv.style.display = 'block';
        }

        function newBattle() {
            document.getElementById('battleResult').style.display = 'none';
            document.getElementById('battleLayout').style.display = 'none';
            document.getElementById('teamSelection').style.display = 'block';
            playerTeam = [];
            document.getElementById('selectedCount').textContent = '0';
            populatePokemonSelection();
        }

        // Funciones de animación
        function animateAttack(side) {
            const element = document.getElementById(side + 'Pokemon');
            element.classList.add('attacking');
            setTimeout(() => element.classList.remove('attacking'), 500);
        }

        function animateHit(side) {
            const element = document.getElementById(side + 'Pokemon');
            element.classList.add('hit');
            setTimeout(() => element.classList.remove('hit'), 300);
        }

        function showDamageNumber(damage, effectiveness, isCritical) {
            const enemyEl = document.getElementById('enemyPokemon');
            const number = document.createElement('div');
            
            let className = 'damage-number normal';
            if (isCritical) className = 'damage-number critical';
            else if (effectiveness >= 2) className = 'damage-number effective';
            else if (effectiveness <= 0.5) className = 'damage-number resisted';
            
            number.className = className;
            number.textContent = '-' + Math.floor(damage);
            number.style.left = '50%';
            number.style.top = '30%';
            
            enemyEl.appendChild(number);
            setTimeout(() => number.remove(), 1000);
        }

        function addBattleLog(message) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function disableMoves(disabled) {
            const buttons = document.querySelectorAll('.move-btn');
            buttons.forEach(btn => btn.disabled = disabled);
        }
        
    </script>
</body>
</html>
